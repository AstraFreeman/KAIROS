<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Sky gradient (split East/West) -->
  <rect x="0" y="0" width="200" height="200" fill="#c0c0c0"/>
  <rect x="200" y="0" width="200" height="200" fill="#87CEEB"/>
  <!-- The Wall (concrete grey) -->
  <rect x="0" y="120" width="400" height="80" fill="#8a8a8a"/>
  <!-- Wall texture (horizontal joints) -->
  <g stroke="#707070" stroke-width="1.5" fill="none">
    <line x1="0" y1="135" x2="400" y2="135"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="165" x2="400" y2="165"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="195" x2="400" y2="195"/>
  </g>
  <!-- Vertical joints (offset) -->
  <g stroke="#707070" stroke-width="1">
    <line x1="50" y1="120" x2="50" y2="135"/><line x1="100" y1="135" x2="100" y2="150"/>
    <line x1="50" y1="150" x2="50" y2="165"/><line x1="150" y1="165" x2="150" y2="180"/>
    <line x1="80" y1="180" x2="80" y2="195"/><line x1="200" y1="120" x2="200" y2="135"/>
    <line x1="250" y1="135" x2="250" y2="150"/><line x1="300" y1="150" x2="300" y2="165"/>
    <line x1="350" y1="165" x2="350" y2="180"/><line x1="320" y1="180" x2="320" y2="195"/>
  </g>
  <!-- Graffiti on West side of wall -->
  <text x="25" y="148" fill="#e74c3c" font-family="Impact, sans-serif" font-size="22" font-weight="bold" transform="rotate(-5,25,148)">FREIHEIT</text>
  <text x="10" y="175" fill="#3498db" font-family="Impact, sans-serif" font-size="14">PEACE ✌</text>
  <!-- East side (grey, no graffiti, watchtower) -->
  <g fill="#6a6a6a" transform="translate(260,50)">
    <rect x="0" y="0" width="60" height="72"/>
    <rect x="-8" y="60" width="76" height="10"/>
    <rect x="10" y="20" width="15" height="15" fill="#87CEEB" opacity="0.8"/> <!-- window -->
    <rect x="35" y="20" width="15" height="15" fill="#87CEEB" opacity="0.8"/>
    <!-- Guard tower legs -->
    <rect x="5" y="70" width="8" height="50"/>
    <rect x="47" y="70" width="8" height="50"/>
  </g>
  <!-- People celebrating (West side, simple figures) -->
  <g transform="translate(40,90)">
    <circle cx="0" cy="0" r="10" fill="#c8a882"/>
    <ellipse cx="0" cy="22" rx="10" ry="16" fill="#2c3e50"/>
    <!-- Arms raised in celebration -->
    <line x1="-10" y1="12" x2="-25" y2="-2" stroke="#c8a882" stroke-width="5"/>
    <line x1="10" y1="12" x2="25" y2="-2" stroke="#c8a882" stroke-width="5"/>
  </g>
  <g transform="translate(90,88)">
    <circle cx="0" cy="0" r="9" fill="#a0785a"/>
    <ellipse cx="0" cy="20" rx="9" ry="15" fill="#8b0000"/>
    <line x1="-9" y1="10" x2="-22" y2="-5" stroke="#a0785a" stroke-width="5"/>
    <line x1="9" y1="10" x2="22" y2="-5" stroke="#a0785a" stroke-width="5"/>
  </g>
  <!-- Hammer knocking wall -->
  <g transform="translate(140,75)">
    <circle cx="0" cy="0" r="8" fill="#c8a882"/>
    <ellipse cx="0" cy="18" rx="8" ry="14" fill="#1a6b2a"/>
    <line x1="10" y1="8" x2="38" y2="35" stroke="#6b3a1f" stroke-width="6"/>
    <rect x="35" y="30" width="20" height="12" rx="3" fill="#4a3728" transform="rotate(30,35,30)"/>
  </g>
  <!-- Ground below wall -->
  <rect x="0" y="200" width="400" height="100" fill="#5a8a3a"/>
  <!-- Date on wall -->
  <text x="185" y="145" fill="#f0d060" font-family="Impact, sans-serif" font-size="16" font-weight="bold">9.11.1989</text>
  <!-- Caption bar -->
  <rect x="0" y="262" width="400" height="38" fill="rgba(0,0,0,0.7)"/>
  <text x="200" y="285" fill="#ffffff" font-family="Georgia, serif" font-size="12" text-anchor="middle">Падіння Берлінської стіни · Карикатура · 1989 р.</text>
</svg>
