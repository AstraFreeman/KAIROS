<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Desert sky (orange-ish) -->
  <rect width="400" height="300" fill="#e8a835"/>
  <!-- Sun -->
  <circle cx="320" cy="60" r="38" fill="#f0c060" opacity="0.9"/>
  <!-- Desert sand -->
  <rect x="0" y="200" width="400" height="100" fill="#c8922a"/>
  <!-- Pyramid (iconic) -->
  <polygon points="200,40 40,200 360,200" fill="#d4a843"/>
  <polygon points="200,40 40,200 360,200" fill="none" stroke="#8b6520" stroke-width="2"/>
  <!-- Pyramid shadow side -->
  <polygon points="200,40 200,200 360,200" fill="#b8882a" opacity="0.5"/>
  <!-- Pyramid stone lines -->
  <g stroke="#8b6520" stroke-width="1" opacity="0.5">
    <line x1="195" y1="60" x2="205" y2="60"/>
    <line x1="183" y1="80" x2="217" y2="80"/>
    <line x1="170" y1="100" x2="230" y2="100"/>
    <line x1="155" y1="120" x2="245" y2="120"/>
    <line x1="140" y1="140" x2="260" y2="140"/>
    <line x1="120" y1="160" x2="280" y2="160"/>
    <line x1="98" y1="180" x2="302" y2="180"/>
  </g>
  <!-- Chain / whip (the "slave" myth imagery) -->
  <path d="M80,150 Q95,165 85,180 Q75,195 90,210" stroke="#1a1208" stroke-width="4" fill="none" stroke-dasharray="6,3"/>
  <!-- Worker figures (tiny, laboring) -->
  <g fill="#5a3a10" transform="translate(60,195)">
    <circle cx="0" cy="-8" r="5"/><rect x="-5" cy="0" x="-4" y="0" width="8" height="12"/>
    <circle cx="20" cy="-8" r="5"/><rect x="16" y="0" width="8" height="12"/>
    <circle cx="40" cy="-8" r="5"/><rect x="36" y="0" width="8" height="12"/>
    <circle cx="260" cy="-8" r="5"/><rect x="256" y="0" width="8" height="12"/>
    <circle cx="280" cy="-8" r="5"/><rect x="276" y="0" width="8" height="12"/>
  </g>
  <!-- Dramatic chain image across workers -->
  <!-- "Shocking" text overlay -->
  <rect x="0" y="0" width="400" height="38" fill="rgba(0,0,0,0.8)"/>
  <text x="200" y="27" fill="#f39c12" font-family="Impact, sans-serif" font-size="19" font-weight="bold" text-anchor="middle">ПІРАМІДИ БУДУВАЛИ 100 000 РАБІВ!</text>
  <!-- Claim text on pyramid area -->
  <rect x="60" y="215" width="280" height="44" fill="rgba(0,0,0,0.65)" rx="4"/>
  <text x="200" y="232" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">«Геродот писав про 100 тисяч рабів!</text>
  <text x="200" y="250" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Ось ДОКАЗ, якого вас не вчили!»</text>
  <!-- Source -->
  <rect x="0" y="268" width="400" height="32" fill="rgba(0,0,0,0.8)"/>
  <text x="200" y="288" fill="#bdc3c7" font-family="sans-serif" font-size="11" text-anchor="middle">ІсторіяFAKTS.ua · «Таємниці стародавнього світу» · 2024</text>
</svg>
