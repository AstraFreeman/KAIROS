<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Space background (dark) -->
  <rect width="400" height="300" fill="#050a18"/>
  <!-- Stars -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="20" cy="15" r="1.5"/><circle cx="55" cy="8" r="1"/><circle cx="90" cy="20" r="2"/>
    <circle cx="130" cy="10" r="1.5"/><circle cx="180" cy="18" r="1"/><circle cx="220" cy="5" r="2"/>
    <circle cx="265" cy="15" r="1.5"/><circle cx="305" cy="8" r="1"/><circle cx="345" cy="20" r="2"/>
    <circle cx="380" cy="12" r="1.5"/><circle cx="40" cy="40" r="1"/><circle cx="150" cy="35" r="1.5"/>
    <circle cx="250" cy="30" r="1"/><circle cx="360" cy="42" r="1.5"/>
  </g>
  <!-- Earth (curving sphere) -->
  <circle cx="200" cy="220" r="170" fill="#1a4a8a"/>
  <!-- Cloud cover on earth -->
  <ellipse cx="100" cy="160" rx="55" ry="22" fill="#e0e0e0" opacity="0.6"/>
  <ellipse cx="300" cy="180" rx="45" ry="18" fill="#e0e0e0" opacity="0.5"/>
  <!-- Green land mass (China-ish shape) -->
  <ellipse cx="250" cy="175" rx="70" ry="45" fill="#2d7a3a" opacity="0.8"/>
  <!-- The Great Wall (suspiciously visible bright line) -->
  <path d="M180,155 Q210,148 240,152 Q270,148 295,155 Q310,160 325,155"
        stroke="#f39c12" stroke-width="5" fill="none" stroke-linecap="round"
        opacity="0.95"/>
  <!-- Giant magnifying glass (joke) -->
  <circle cx="250" cy="152" r="38" fill="none" stroke="#bdc3c7" stroke-width="5"/>
  <line x1="278" y1="180" x2="310" y2="210" stroke="#bdc3c7" stroke-width="8" stroke-linecap="round"/>
  <!-- Astronaut figure (tiny) -->
  <g transform="translate(60,90)" opacity="0.9">
    <circle cx="0" cy="0" r="12" fill="#e0e0e0"/>
    <circle cx="0" cy="0" r="8" fill="#87CEEB"/>
    <ellipse cx="0" cy="22" rx="14" ry="18" fill="#e0e0e0"/>
    <line x1="-14" y1="14" x2="-28" y2="5" stroke="#e0e0e0" stroke-width="5"/>
    <line x1="14" y1="14" x2="28" y2="5" stroke="#e0e0e0" stroke-width="5"/>
    <line x1="-7" y1="38" x2="-7" y2="58" stroke="#e0e0e0" stroke-width="5"/>
    <line x1="7" y1="38" x2="7" y2="58" stroke="#e0e0e0" stroke-width="5"/>
    <!-- Speech bubble -->
    <rect x="25" y="-15" width="80" height="30" rx="5" fill="#ffffff"/>
    <polygon points="25,-5 12,5 25,8" fill="#ffffff"/>
    <text x="65" y="0" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">Бачу стіну!</text>
    <text x="65" y="12" font-family="sans-serif" font-size="9" fill="#c0392b" text-anchor="middle">Ні, не бачиш!</text>
  </g>
  <!-- Top banner -->
  <rect x="0" y="0" width="400" height="38" fill="rgba(0,0,0,0.9)"/>
  <text x="200" y="26" fill="#f39c12" font-family="Impact, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">ВЕЛИКА СТІНА ВИДНА З КОСМОСУ!</text>
  <!-- Source -->
  <rect x="0" y="268" width="400" height="32" fill="rgba(0,0,0,0.85)"/>
  <text x="200" y="288" fill="#bdc3c7" font-family="sans-serif" font-size="11" text-anchor="middle">ІсторіяFAKTS.ua · «Чудеса світу: вигадки і реальність» · 2024</text>
</svg>
