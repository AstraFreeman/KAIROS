<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Dark blue Ukrainian night sky -->
  <rect width="400" height="300" fill="#0d1f3c"/>
  <!-- Stars -->
  <g fill="#f0d060" opacity="0.9">
    <circle cx="30" cy="25" r="2"/><circle cx="80" cy="15" r="1.5"/><circle cx="140" cy="30" r="2"/>
    <circle cx="200" cy="18" r="2.5"/><circle cx="260" cy="25" r="1.5"/><circle cx="320" cy="12" r="2"/>
    <circle cx="370" cy="28" r="1.5"/><circle cx="50" cy="45" r="1.5"/><circle cx="350" cy="45" r="2"/>
  </g>
  <!-- Golden trident (Ukrainian symbol) at top center -->
  <g fill="#f0d060" transform="translate(175,15) scale(0.9)">
    <rect x="24" y="25" width="8" height="40"/>
    <rect x="10" y="25" width="8" height="30"/>
    <rect x="38" y="25" width="8" height="30"/>
    <ellipse cx="14" cy="22" rx="7" ry="8"/>
    <ellipse cx="42" cy="22" rx="7" ry="8"/>
    <ellipse cx="28" cy="18" rx="7" ry="10"/>
    <rect x="16" y="62" width="24" height="5"/>
  </g>
  <!-- Cossack silhouette (center) -->
  <g transform="translate(140,70)">
    <!-- Body (dark, heroic pose) -->
    <ellipse cx="60" cy="130" rx="35" ry="65" fill="#1a1208"/>
    <!-- Head with oseledets (scalp lock) -->
    <circle cx="60" cy="58" r="26" fill="#c8a882"/>
    <!-- Oseledets -->
    <ellipse cx="60" cy="35" rx="5" ry="20" fill="#1a1208"/>
    <!-- Moustache -->
    <path d="M45,70 Q55,76 60,73 Q65,76 75,70" stroke="#1a1208" stroke-width="3" fill="none"/>
    <!-- Raised sword (right) -->
    <line x1="90" y1="100" x2="145" y2="40" stroke="#c8a882" stroke-width="5" stroke-linecap="round"/>
    <!-- Sword guard -->
    <line x1="115" y1="70" x2="125" y2="82" stroke="#f0d060" stroke-width="4"/>
    <!-- Shield (left arm) -->
    <ellipse cx="20" cy="115" rx="18" ry="22" fill="#1a3f8f"/>
    <ellipse cx="20" cy="115" rx="12" ry="15" fill="#c0392b"/>
    <line cx="20" cx="20" x1="20" y1="100" x2="20" y2="130" stroke="#f0d060" stroke-width="2"/>
  </g>
  <!-- Decorative Ukrainian embroidery border -->
  <rect x="0" y="0" width="400" height="15" fill="#c0392b" opacity="0.8"/>
  <rect x="0" y="285" width="400" height="15" fill="#c0392b" opacity="0.8"/>
  <!-- Simple cross/diamond embroidery pattern -->
  <g fill="#f0d060" opacity="0.9">
    <polygon points="20,8 25,3 30,8 25,13"/><polygon points="50,8 55,3 60,8 55,13"/>
    <polygon points="80,8 85,3 90,8 85,13"/><polygon points="110,8 115,3 120,8 115,13"/>
    <polygon points="140,8 145,3 150,8 145,13"/><polygon points="170,8 175,3 180,8 175,13"/>
    <polygon points="200,8 205,3 210,8 205,13"/><polygon points="230,8 235,3 240,8 235,13"/>
    <polygon points="260,8 265,3 270,8 265,13"/><polygon points="290,8 295,3 300,8 295,13"/>
    <polygon points="320,8 325,3 330,8 325,13"/><polygon points="350,8 355,3 360,8 355,13"/>
    <polygon points="380,8 385,3 390,8 385,13"/>
  </g>
  <!-- Title block -->
  <rect x="30" y="240" width="340" height="42" fill="#1a3f8f" opacity="0.85" rx="4"/>
  <text x="200" y="258" fill="#f0d060" font-family="Georgia, serif" font-size="16" font-weight="bold" text-anchor="middle">КОЗАЦЬКА СЛАВА</text>
  <text x="200" y="275" fill="#e0e0e0" font-family="Georgia, serif" font-size="11" text-anchor="middle">Пропагандистський плакат · Гетьманщина, XVII–XVIII ст.</text>
</svg>
