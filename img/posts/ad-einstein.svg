<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Chalk-board green background -->
  <rect width="400" height="300" fill="#1a3d2b"/>
  <!-- Chalk texture lines -->
  <g stroke="#2a5a40" stroke-width="1" opacity="0.4">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
  </g>
  <!-- Einstein figure (recognizable: wild hair, tongue out) -->
  <g transform="translate(50,40)">
    <!-- Wild hair (iconic) -->
    <ellipse cx="65" cy="45" rx="55" ry="50" fill="#e0e0e0"/>
    <ellipse cx="65" cy="55" rx="42" ry="42" fill="#c8a882"/>
    <!-- Hair spikes (wild) -->
    <ellipse cx="20" cy="20" rx="12" ry="22" fill="#e0e0e0" transform="rotate(-25,20,20)"/>
    <ellipse cx="65" cy="8" rx="10" ry="20" fill="#e0e0e0"/>
    <ellipse cx="110" cy="18" rx="12" ry="22" fill="#e0e0e0" transform="rotate(20,110,18)"/>
    <!-- Eyes -->
    <circle cx="50" cy="52" r="8" fill="#3a5a7a"/>
    <circle cx="80" cy="52" r="8" fill="#3a5a7a"/>
    <circle cx="52" cy="50" r="3" fill="#1a1a1a"/>
    <circle cx="82" cy="50" r="3" fill="#1a1a1a"/>
    <!-- Moustache -->
    <path d="M42,68 Q65,80 88,68" stroke="#8b6033" stroke-width="5" fill="none"/>
    <!-- Tongue out (iconic photo) -->
    <ellipse cx="65" cy="82" rx="12" ry="8" fill="#e05050"/>
    <!-- Body (sweater) -->
    <ellipse cx="65" cy="150" rx="50" ry="60" fill="#4a4a6a"/>
    <!-- Report card "2" (fail grade) - actually he EXCELLED -->
    <rect x="130" y="90" width="65" height="80" fill="#f5f0e0" rx="4" transform="rotate(10,130,90)"/>
    <text x="163" y="135" fill="#c0392b" font-family="Impact, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" transform="rotate(10,163,135)">2</text>
    <text x="163" y="158" fill="#1a1a1a" font-family="sans-serif" font-size="9" text-anchor="middle" transform="rotate(10,163,158)">Математика</text>
  </g>
  <!-- Equations on blackboard -->
  <text x="270" y="80" fill="#c8c8c8" font-family="serif" font-size="18" opacity="0.7">E=mc²</text>
  <text x="265" y="110" fill="#c8c8c8" font-family="serif" font-size="14" opacity="0.5">∇²φ = 4πρ</text>
  <text x="270" y="135" fill="#c8c8c8" font-family="serif" font-size="16" opacity="0.6">Σ F = ma</text>
  <!-- "SHOCKING" overlay banner -->
  <rect x="0" y="0" width="400" height="38" fill="rgba(0,0,0,0.85)"/>
  <text x="200" y="27" fill="#f39c12" font-family="Impact, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">АЙНШТАЙН ПРОВАЛИВ МАТЕМАТИКУ!</text>
  <!-- Claim box -->
  <rect x="200" y="205" width="190" height="52" fill="rgba(0,0,0,0.7)" rx="4"/>
  <text x="295" y="222" fill="#ffffff" font-family="sans-serif" font-size="10" text-anchor="middle">«Навіть геній не міг вчитися!</text>
  <text x="295" y="237" fill="#ffffff" font-family="sans-serif" font-size="10" text-anchor="middle">Чи вас навчали цьому?»</text>
  <text x="295" y="252" fill="#f39c12" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Читати далі →</text>
  <!-- Source -->
  <rect x="0" y="268" width="400" height="32" fill="rgba(0,0,0,0.85)"/>
  <text x="200" y="288" fill="#bdc3c7" font-family="sans-serif" font-size="11" text-anchor="middle">ІсторіяFAKTS.ua · «Великі постаті: правда та брехня» · 2024</text>
</svg>
