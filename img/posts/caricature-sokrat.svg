<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Red-figure pottery background -->
  <rect width="400" height="300" fill="#b5451b"/>
  <!-- Top & bottom bar (black) -->
  <rect x="0" y="0" width="400" height="42" fill="#1a1208"/>
  <rect x="0" y="258" width="400" height="42" fill="#1a1208"/>
  <!-- Greek meander border (simplified) -->
  <g fill="#b5451b" transform="translate(10,8)">
    <rect x="0" y="0" width="6" height="18"/><rect x="0" y="0" width="12" height="6"/>
    <rect x="12" y="6" width="6" height="18"/><rect x="12" y="20" width="12" height="6"/>
    <rect x="30" y="0" width="6" height="18"/><rect x="30" y="0" width="12" height="6"/>
    <rect x="42" y="6" width="6" height="18"/><rect x="42" y="20" width="12" height="6"/>
    <rect x="60" y="0" width="6" height="18"/><rect x="60" y="0" width="12" height="6"/>
    <rect x="72" y="6" width="6" height="18"/><rect x="72" y="20" width="12" height="6"/>
    <rect x="90" y="0" width="6" height="18"/><rect x="90" y="0" width="12" height="6"/>
    <rect x="102" y="6" width="6" height="18"/><rect x="102" y="20" width="12" height="6"/>
    <rect x="120" y="0" width="6" height="18"/><rect x="120" y="0" width="12" height="6"/>
    <rect x="132" y="6" width="6" height="18"/><rect x="132" y="20" width="12" height="6"/>
    <rect x="150" y="0" width="6" height="18"/><rect x="150" y="0" width="12" height="6"/>
    <rect x="162" y="6" width="6" height="18"/><rect x="162" y="20" width="12" height="6"/>
    <rect x="180" y="0" width="6" height="18"/><rect x="180" y="0" width="12" height="6"/>
    <rect x="192" y="6" width="6" height="18"/><rect x="192" y="20" width="12" height="6"/>
    <rect x="210" y="0" width="6" height="18"/><rect x="210" y="0" width="12" height="6"/>
    <rect x="222" y="6" width="6" height="18"/><rect x="222" y="20" width="12" height="6"/>
    <rect x="240" y="0" width="6" height="18"/><rect x="240" y="0" width="12" height="6"/>
    <rect x="252" y="6" width="6" height="18"/><rect x="252" y="20" width="12" height="6"/>
    <rect x="270" y="0" width="6" height="18"/><rect x="270" y="0" width="12" height="6"/>
    <rect x="282" y="6" width="6" height="18"/><rect x="282" y="20" width="12" height="6"/>
    <rect x="300" y="0" width="6" height="18"/><rect x="300" y="0" width="12" height="6"/>
    <rect x="312" y="6" width="6" height="18"/><rect x="312" y="20" width="12" height="6"/>
    <rect x="330" y="0" width="6" height="18"/><rect x="330" y="0" width="12" height="6"/>
    <rect x="342" y="6" width="6" height="18"/><rect x="342" y="20" width="12" height="6"/>
    <rect x="360" y="0" width="6" height="18"/><rect x="360" y="0" width="12" height="6"/>
  </g>
  <!-- Main scene area -->
  <rect x="20" y="50" width="360" height="200" fill="#b5451b"/>
  <!-- Socrates (black figure) - exaggerated features -->
  <!-- Body/robe -->
  <ellipse cx="155" cy="175" rx="38" ry="60" fill="#1a1208"/>
  <!-- Head (large, round) -->
  <circle cx="155" cy="100" r="32" fill="#1a1208"/>
  <!-- Exaggerated nose pointing right -->
  <ellipse cx="182" cy="102" rx="14" ry="8" fill="#1a1208"/>
  <!-- Beard (curly bottom) -->
  <ellipse cx="155" cy="128" rx="22" ry="12" fill="#1a1208"/>
  <!-- Raised finger (lecture pose) -->
  <line x1="190" y1="155" x2="240" y2="120" stroke="#1a1208" stroke-width="9" stroke-linecap="round"/>
  <circle cx="244" cy="117" r="6" fill="#1a1208"/>
  <!-- Scroll/cup (hemlock) in other hand -->
  <line x1="120" y1="160" x2="85" y2="145" stroke="#1a1208" stroke-width="9" stroke-linecap="round"/>
  <rect x="68" y="133" width="20" height="28" rx="4" fill="#1a1208"/>
  <!-- Student (smaller figure, right side) -->
  <circle cx="300" cy="108" r="18" fill="#1a1208"/>
  <ellipse cx="300" cy="168" rx="22" ry="38" fill="#1a1208"/>
  <!-- Students question marks -->
  <text x="270" y="95" fill="#b5451b" font-family="serif" font-size="22" font-weight="bold">?</text>
  <text x="330" y="90" fill="#b5451b" font-family="serif" font-size="18" font-weight="bold">?</text>
  <!-- Caption in bottom bar -->
  <text x="200" y="286" fill="#e8c49a" font-family="Georgia, serif" font-size="13" text-anchor="middle">Σωκράτης в Агорі · Карикатура · V ст. до н.е.</text>
</svg>
