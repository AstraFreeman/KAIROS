<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Alarming red/orange gradient background -->
  <rect width="400" height="300" fill="#c0392b"/>
  <rect width="400" height="300" fill="url(#alarm)" opacity="0.4"/>
  <!-- Dramatic lightning bolts (clickbait style) -->
  <polygon points="50,20 35,80 55,75 40,130 70,65 48,70" fill="#f39c12" opacity="0.9"/>
  <polygon points="350,20 335,80 355,75 340,130 370,65 348,70" fill="#f39c12" opacity="0.9"/>
  <!-- Napoleon silhouette (exaggerated short) -->
  <g transform="translate(150,50)">
    <!-- Iconic bicorne hat -->
    <ellipse cx="50" cy="28" rx="52" ry="12" fill="#1a1208"/>
    <rect x="22" y="5" width="56" height="26" fill="#1a1208"/>
    <rect x="28" y="0" width="44" height="12" fill="#2c2c2c"/>
    <!-- Head -->
    <circle cx="50" cy="52" r="26" fill="#c8a882"/>
    <!-- Imperial coat -->
    <ellipse cx="50" cy="120" rx="42" ry="58" fill="#1a1208"/>
    <!-- Gold epaulettes -->
    <ellipse cx="10" cy="82" rx="14" ry="8" fill="#f39c12"/>
    <ellipse cx="90" cy="82" rx="14" ry="8" fill="#f39c12"/>
    <!-- Short legs (emphasized) -->
    <rect x="30" y="172" width="16" height="28" fill="#1a1208" rx="3"/>
    <rect x="54" y="172" width="16" height="28" fill="#1a1208" rx="3"/>
    <!-- Boots -->
    <rect x="28" y="194" width="20" height="14" fill="#2c1a0a" rx="2"/>
    <rect x="52" y="194" width="20" height="14" fill="#2c1a0a" rx="2"/>
    <!-- Hand in coat -->
    <rect x="20" y="100" width="25" height="18" rx="5" fill="#1a1208"/>
  </g>
  <!-- Height ruler on left -->
  <rect x="130" y="58" width="8" height="192" fill="#f39c12" opacity="0.8"/>
  <text x="142" y="250" fill="#f39c12" font-family="Impact, sans-serif" font-size="11">160 см?!</text>
  <!-- Shocking text banner -->
  <rect x="10" y="10" width="380" height="42" fill="rgba(0,0,0,0.7)"/>
  <text x="200" y="38" fill="#f39c12" font-family="Impact, sans-serif" font-size="26" font-weight="bold" text-anchor="middle">ШОК! НАПОЛЕОН БУВ КАРЛИКОМ!</text>
  <!-- Fake source badge -->
  <rect x="10" y="265" width="380" height="30" fill="rgba(0,0,0,0.75)"/>
  <text x="200" y="284" fill="#bdc3c7" font-family="sans-serif" font-size="11" text-anchor="middle">ІсторіяFAKTS.ua · «Факти, які від вас приховують» · 2024</text>
</svg>
